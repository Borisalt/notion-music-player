<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #FFE4EC 0%, #FFD6D6 30%, #FFDAC8 60%, #FFF3E0 100%);
  background-attachment: fixed;
}
.bg-blob {
  position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.5; pointer-events: none;
}
.blob-1 { width: 300px; height: 300px; background: #FFB3C6; top: -80px; left: -60px; }
.blob-2 { width: 250px; height: 250px; background: #FFDDB6; bottom: -60px; right: -40px; }
.blob-3 { width: 200px; height: 200px; background: #E8A0C8; top: 40%; left: 50%; }
.player {
  width: 100%; max-width: 400px;
  padding: 2rem 1.5rem;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  box-shadow: 0 8px 32px rgba(200, 140, 140, 0.15);
  position: relative; z-index: 1;
}
.album-art-wrap {
  width: 180px; height: 180px;
  margin: 0 auto 1.5rem;
  position: relative;
}
.album-art {
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(200, 140, 140, 0.15);
}
.album-art img { width: 100%; height: 100%; object-fit: cover; }
.album-art.spinning { animation: spin 8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.center-hole {
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, #FFE4EC, #FFDAC8);
  border: 2px solid rgba(255, 255, 255, 0.6);
  box-shadow: 0 0 8px rgba(200, 140, 140, 0.2);
  z-index: 2;
  pointer-events: none;
}
.track-info { text-align: center; margin-bottom: 1.5rem; }
.track-title { font-size: 17px; font-weight: 500; color: #5C3A3A; margin-bottom: 4px; }
.track-artist { font-size: 13px; color: #9E7070; }
.progress-wrap { margin-bottom: 1rem; padding: 0 4px; }
.progress-bar {
  width: 100%; height: 5px;
  background: rgba(180, 120, 120, 0.12);
  border-radius: 3px; cursor: pointer; position: relative;
}
.progress-fill {
  width: 0%; height: 100%;
  background: linear-gradient(90deg, #E89E9E, #D4847E);
  border-radius: 3px;
}
.progress-thumb {
  width: 14px; height: 14px;
  background: #fff; border: 2px solid #D4847E;
  border-radius: 50%; position: absolute; top: -5px; left: 0%;
  transform: translateX(-50%);
  opacity: 0; transition: opacity 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.progress-bar:hover .progress-thumb { opacity: 1; }
.time-row {
  display: flex; justify-content: space-between;
  font-size: 11px; color: #B08080; margin-top: 6px;
}
.controls {
  display: flex; align-items: center; justify-content: center; gap: 20px;
}
.btn {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.btn:active { transform: scale(0.92); }
.btn-play {
  width: 54px; height: 54px;
  background: rgba(255, 255, 255, 0.45);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 50%;
  box-shadow: 0 4px 12px rgba(200, 140, 140, 0.2);
}
.btn-play:hover { background: rgba(255, 255, 255, 0.6); }
.btn-play svg { fill: #C06060; }
.btn-side svg { fill: #B08080; transition: fill 0.2s; }
.btn-side:hover svg { fill: #8A5C5C; }
.extra-controls {
  display: flex; align-items: center; justify-content: center;
  gap: 32px; margin-top: 1.2rem;
}
.btn-extra {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  transition: all 0.2s; position: relative;
}
.btn-extra svg { fill: #B08080; transition: fill 0.2s; }
.btn-extra:hover svg { fill: #8A5C5C; }
.btn-extra.active svg { fill: #D4847E; }
.btn-extra.active::after {
  content: ''; position: absolute; bottom: -4px;
  width: 4px; height: 4px; border-radius: 50%; background: #D4847E;
}
.volume-row {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; margin-top: 1.2rem;
}
.vol-slider {
  -webkit-appearance: none; appearance: none;
  width: 90px; height: 3px;
  background: rgba(180, 120, 120, 0.18);
  border-radius: 2px; outline: none;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 10px; height: 10px;
  background: #D4847E; border-radius: 50%; cursor: pointer;
}
</style>
</head>
<body>
<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>
<div class="bg-blob blob-3"></div>
<div class="player">
  <div class="album-art-wrap">
    <div class="album-art" id="albumArt"></div>
    <div class="center-hole"></div>
  </div>
  <div class="track-info">
    <div class="track-title" id="trackTitle">Song Title</div>
    <div class="track-artist" id="trackArtist">Artist</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progBar">
      <div class="progress-fill" id="progFill"></div>
      <div class="progress-thumb" id="progThumb"></div>
    </div>
    <div class="time-row">
      <span id="curTime">0:00</span>
      <span id="totTime">0:00</span>
    </div>
  </div>
  <div class="controls">
    <button class="btn btn-side" id="prevBtn">
      <svg width="22" height="22" viewBox="0 0 24 24"><path d="M19 20L9 12l10-8v16zM5 4h2v16H5V4z"/></svg>
    </button>
    <button class="btn btn-play" id="playBtn">
      <svg width="24" height="24" viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="btn btn-side" id="nextBtn">
      <svg width="22" height="22" viewBox="0 0 24 24"><path d="M5 4l10 8-10 8V4zm12 0h2v16h-2V4z"/></svg>
    </button>
  </div>
  <div class="extra-controls">
    <button class="btn-extra" id="shuffleBtn" title="셔플">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
    </button>
    <button class="btn-extra" id="repeatBtn" title="전체 반복">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
    </button>
    <button class="btn-extra" id="repeatOneBtn" title="한곡 반복">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/><text x="12" y="15" text-anchor="middle" font-size="7" font-weight="700" fill="currentColor" font-family="Inter">1</text></svg>
    </button>
  </div>
  <div class="volume-row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="#B08080"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.47 4.47 0 002.5-3.5z"/></svg>
    <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="70">
  </div>
</div>
<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 여기에 곡 정보를 수정하세요
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const playlist = [
  { title: "노래 제목 1", artist: "아티스트 1", src: "YOUR_AUDIO_URL_1.mp3", cover: "" },
  { title: "노래 제목 2", artist: "아티스트 2", src: "YOUR_AUDIO_URL_2.mp3", cover: "" }
];
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let repeatMode = 'none';
let shuffleOn = false;
let currentIdx = 0;
let playing = false;
const audio = new Audio();
const $ = id => document.getElementById(id);
const playBtn=$('playBtn'), playIcon=$('playIcon'), progFill=$('progFill'),
  progThumb=$('progThumb'), progBar=$('progBar'), curTime=$('curTime'),
  totTime=$('totTime'), volSlider=$('volSlider'), albumArt=$('albumArt'),
  repeatBtn=$('repeatBtn'), repeatOneBtn=$('repeatOneBtn'), shuffleBtn=$('shuffleBtn');

const fmt = s => { s=Math.round(s); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };

function loadTrack(i) {
  const t=playlist[i];
  $('trackTitle').textContent=t.title;
  $('trackArtist').textContent=t.artist;
  audio.src=t.src;
  albumArt.innerHTML = t.cover
    ? '<img src="'+t.cover+'" alt="cover">'
    : '';
  progFill.style.width='0%'; progThumb.style.left='0%';
  curTime.textContent='0:00'; totTime.textContent='0:00';
}

function setPlaying(s) {
  playing=s;
  playIcon.innerHTML = s ? '<path d="M6 4h4v16H6zm8 0h4v16h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
  albumArt.classList.toggle('spinning', s);
}

playBtn.onclick = () => { playing ? (audio.pause(),setPlaying(false)) : (audio.play(),setPlaying(true)); };

function next() {
  if (shuffleOn) { let r; do{r=Math.floor(Math.random()*playlist.length)}while(r===currentIdx&&playlist.length>1); currentIdx=r; }
  else currentIdx=(currentIdx+1)%playlist.length;
  loadTrack(currentIdx); if(playing) audio.play();
}
function prev() {
  if(audio.currentTime>3){audio.currentTime=0;return;}
  currentIdx=(currentIdx-1+playlist.length)%playlist.length;
  loadTrack(currentIdx); if(playing) audio.play();
}

$('prevBtn').onclick=prev; $('nextBtn').onclick=next;

repeatBtn.onclick = () => {
  if(repeatMode==='all'){repeatMode='none';repeatBtn.classList.remove('active');}
  else{repeatMode='all';repeatBtn.classList.add('active');repeatOneBtn.classList.remove('active');}
};
repeatOneBtn.onclick = () => {
  if(repeatMode==='one'){repeatMode='none';repeatOneBtn.classList.remove('active');}
  else{repeatMode='one';repeatOneBtn.classList.add('active');repeatBtn.classList.remove('active');}
};
shuffleBtn.onclick = () => { shuffleOn=!shuffleOn; shuffleBtn.classList.toggle('active',shuffleOn); };

audio.ontimeupdate = () => {
  if(!audio.duration) return;
  const p=(audio.currentTime/audio.duration)*100;
  progFill.style.width=p+'%'; progThumb.style.left=p+'%';
  curTime.textContent=fmt(audio.currentTime);
};
audio.onloadedmetadata = () => { totTime.textContent=fmt(audio.duration); };
audio.onended = () => {
  if(repeatMode==='one'){audio.currentTime=0;audio.play();}
  else if(repeatMode==='all') next();
  else if(currentIdx<playlist.length-1) next();
  else setPlaying(false);
};

progBar.onclick = e => { if(audio.duration) audio.currentTime=(e.offsetX/progBar.offsetWidth)*audio.duration; };
volSlider.oninput = e => { audio.volume=e.target.value/100; };

audio.volume=0.7; loadTrack(0);
</script>
</body>
</html>
