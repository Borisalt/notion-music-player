<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  background: #FFFFFFF;
  background-attachment: fixed;
}
.bg-blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.5; pointer-events: none; }
.blob-1 { width: 300px; height: 300px; background: #FFB3C6; top: -80px; left: -60px; }
.blob-2 { width: 250px; height: 250px; background: #FFDDB6; bottom: -60px; right: -40px; }
.blob-3 { width: 200px; height: 200px; background: #E8A0C8; top: 30%; left: 60%; }
  
.player {
  width: 100%; max-width: 620px;
  padding: 1.2rem 1.5rem;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  box-shadow: 0 8px 32px rgba(200, 140, 140, 0.15);
  display: flex; align-items: center; gap: 1.2rem;
  position: relative; z-index: 1;
}

.album-art-wrap { position: relative; flex-shrink: 0; }
.album-art {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  box-shadow: 0 2px 10px rgba(200, 140, 140, 0.15);
}
.album-art img { width: 100%; height: 100%; object-fit: cover; }
.album-art.spinning { animation: spin 8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.center-hole {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 16px; height: 16px; border-radius: 50%;
  background: linear-gradient(135deg, #FFE4EC, #FFDAC8);
  border: 1.5px solid rgba(255, 255, 255, 0.6);
  z-index: 2; pointer-events: none;
}

.right-section { flex: 1; min-width: 0; }

.top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.track-info { min-width: 0; }
.track-title {
  font-size: 14px; font-weight: 500; color: #5C3A3A;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-artist { font-size: 11px; color: #9E7070; margin-top: 1px; }

.controls { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.btn {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.btn:active { transform: scale(0.92); }
.btn-play {
  width: 36px; height: 36px;
  background: rgba(255, 255, 255, 0.45);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(200, 140, 140, 0.2);
}
.btn-play:hover { background: rgba(255, 255, 255, 0.6); }
.btn-play svg { fill: #C06060; }
.btn-side svg { fill: #B08080; transition: fill 0.2s; }
.btn-side:hover svg { fill: #8A5C5C; }

.progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.time-label { font-size: 10px; color: #B08080; min-width: 28px; }
.time-right { text-align: right; }
.progress-bar {
  flex: 1; height: 4px;
  background: rgba(180, 120, 120, 0.12);
  border-radius: 2px; cursor: pointer; position: relative;
}
.progress-fill {
  width: 0%; height: 100%;
  background: linear-gradient(90deg, #E89E9E, #D4847E);
  border-radius: 2px;
}
.progress-thumb {
  width: 12px; height: 12px;
  background: #fff; border: 2px solid #D4847E;
  border-radius: 50%; position: absolute; top: -4px; left: 0%;
  transform: translateX(-50%);
  opacity: 0; transition: opacity 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.progress-bar:hover .progress-thumb { opacity: 1; }

.bottom-row { display: flex; align-items: center; justify-content: space-between; }
.extra-controls { display: flex; align-items: center; gap: 14px; }
.btn-extra {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  transition: all 0.2s; position: relative;
}
.btn-extra svg { fill: #B08080; transition: fill 0.2s; }
.btn-extra:hover svg { fill: #8A5C5C; }
.btn-extra.active svg { fill: #D4847E; }
.btn-extra.active::after {
  content: ''; position: absolute; bottom: -3px;
  width: 3px; height: 3px; border-radius: 50%; background: #D4847E;
}

.volume-row { display: flex; align-items: center; gap: 6px; }
.vol-slider {
  -webkit-appearance: none; appearance: none;
  width: 60px; height: 3px;
  background: rgba(180, 120, 120, 0.18);
  border-radius: 2px; outline: none;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 8px; height: 8px;
  background: #D4847E; border-radius: 50%; cursor: pointer;
}
</style>
</head>
<body>
<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>
<div class="bg-blob blob-3"></div>

<div class="player">
  <div class="album-art-wrap">
    <div class="album-art" id="albumArt"></div>
    <div class="center-hole"></div>
  </div>

  <div class="right-section">
    <div class="top-row">
      <div class="track-info">
        <div class="track-title" id="trackTitle">Song Title</div>
        <div class="track-artist" id="trackArtist">Artist</div>
      </div>
      <div class="controls">
        <button class="btn btn-side" id="prevBtn">
          <svg width="16" height="16" viewBox="0 0 24 24"><path d="M19 20L9 12l10-8v16zM5 4h2v16H5V4z"/></svg>
        </button>
        <button class="btn btn-play" id="playBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="btn btn-side" id="nextBtn">
          <svg width="16" height="16" viewBox="0 0 24 24"><path d="M5 4l10 8-10 8V4zm12 0h2v16h-2V4z"/></svg>
        </button>
      </div>
    </div>

    <div class="progress-row">
      <span class="time-label" id="curTime">0:00</span>
      <div class="progress-bar" id="progBar">
        <div class="progress-fill" id="progFill"></div>
        <div class="progress-thumb" id="progThumb"></div>
      </div>
      <span class="time-label time-right" id="totTime">0:00</span>
    </div>

    <div class="bottom-row">
      <div class="extra-controls">
        <button class="btn-extra" id="shuffleBtn" title="셔플">
          <svg width="14" height="14" viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        <button class="btn-extra" id="repeatBtn" title="전체 반복">
          <svg width="14" height="14" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
        <button class="btn-extra" id="repeatOneBtn" title="한곡 반복">
          <svg width="14" height="14" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/><text x="12" y="15" text-anchor="middle" font-size="7" font-weight="700" fill="currentColor" font-family="Inter">1</text></svg>
        </button>
      </div>
      <div class="volume-row">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="#B08080"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.47 4.47 0 002.5-3.5z"/></svg>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="70">
      </div>
    </div>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 여기에 곡 정보를 수정하세요
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const playlist = [
  { title: "Starlit Lullaby (Reverse Theme)", artist: "Wuthering Waves", src: "Starlit%20Lullaby%20(Reverse%20Theme)%20-%20Wuthering%20Waves%20-%20Topic%20(128k).mp3", cover: "" },
  { title: "My Friends, My Homeland", artist: "Wuthering Waves", src: "My_Friends_My_Homeland.mp3", cover: "" },
  { title: "Me and You", artist: "Wuthering Waves", src: "Me_and_You.mp3", cover: "" }
];
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let repeatMode = 'none', shuffleOn = false, currentIdx = 0, playing = false;
const audio = new Audio();
const $ = id => document.getElementById(id);
const playBtn=$('playBtn'), playIcon=$('playIcon'), progFill=$('progFill'),
  progThumb=$('progThumb'), progBar=$('progBar'), curTime=$('curTime'),
  totTime=$('totTime'), volSlider=$('volSlider'), albumArt=$('albumArt'),
  repeatBtn=$('repeatBtn'), repeatOneBtn=$('repeatOneBtn'), shuffleBtn=$('shuffleBtn');

const fmt = s => { s=Math.round(s); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };

function loadTrack(i) {
  const t=playlist[i];
  $('trackTitle').textContent=t.title;
  $('trackArtist').textContent=t.artist;
  audio.src=t.src;
  albumArt.innerHTML = t.cover ? '<img src="'+t.cover+'" alt="cover">' : '';
  progFill.style.width='0%'; progThumb.style.left='0%';
  curTime.textContent='0:00'; totTime.textContent='0:00';
}

function setPlaying(s) {
  playing=s;
  playIcon.innerHTML = s ? '<path d="M6 4h4v16H6zm8 0h4v16h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
  albumArt.classList.toggle('spinning', s);
}

playBtn.onclick = () => { playing ? (audio.pause(),setPlaying(false)) : (audio.play(),setPlaying(true)); };

function next() {
  if(shuffleOn){let r;do{r=Math.floor(Math.random()*playlist.length)}while(r===currentIdx&&playlist.length>1);currentIdx=r;}
  else currentIdx=(currentIdx+1)%playlist.length;
  loadTrack(currentIdx); if(playing) audio.play();
}
function prev() {
  if(audio.currentTime>3){audio.currentTime=0;return;}
  currentIdx=(currentIdx-1+playlist.length)%playlist.length;
  loadTrack(currentIdx); if(playing) audio.play();
}

$('prevBtn').onclick=prev; $('nextBtn').onclick=next;

repeatBtn.onclick = () => {
  if(repeatMode==='all'){repeatMode='none';repeatBtn.classList.remove('active');}
  else{repeatMode='all';repeatBtn.classList.add('active');repeatOneBtn.classList.remove('active');}
};
repeatOneBtn.onclick = () => {
  if(repeatMode==='one'){repeatMode='none';repeatOneBtn.classList.remove('active');}
  else{repeatMode='one';repeatOneBtn.classList.add('active');repeatBtn.classList.remove('active');}
};
shuffleBtn.onclick = () => { shuffleOn=!shuffleOn; shuffleBtn.classList.toggle('active',shuffleOn); };

audio.ontimeupdate = () => {
  if(!audio.duration) return;
  const p=(audio.currentTime/audio.duration)*100;
  progFill.style.width=p+'%'; progThumb.style.left=p+'%';
  curTime.textContent=fmt(audio.currentTime);
};
audio.onloadedmetadata = () => { totTime.textContent=fmt(audio.duration); };
audio.onended = () => {
  if(repeatMode==='one'){audio.currentTime=0;audio.play();}
  else if(repeatMode==='all') next();
  else if(currentIdx<playlist.length-1) next();
  else setPlaying(false);
};

progBar.onclick = e => { if(audio.duration) audio.currentTime=(e.offsetX/progBar.offsetWidth)*audio.duration; };
volSlider.oninput = e => { audio.volume=e.target.value/100; };

audio.volume=0.7; loadTrack(0);
</script>
</body>
</html>
